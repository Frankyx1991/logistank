<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test LogisTank</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn { background-color: #673AB7; color: white; padding: 15px 20px; border: none; border-radius: 8px; font-size: 18px; width: 100%; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        .btn-invitado { background-color: transparent; border: 1px solid white; }
        #debug-console { background-color: #8b0000; color: white; padding: 15px; border-radius: 8px; text-align: left; font-family: monospace; display: none; margin-bottom: 20px; border: 2px solid red; font-size: 14px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

    <div id="debug-console">
        <strong>⚠️ REGISTRO DE ERRORES:</strong><br><br>
    </div>

    <div id="pantalla-login">
        <h2 style="color: #D1C4E9;">LogisTank - DIAGNÓSTICO</h2>
        <p style="color: #aaa; margin-bottom: 30px;">Paso 1: Comprobar qué bloquea el móvil</p>
        
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        
        <button class="btn" onclick="probarBotonLogin()">1. Probar Botón Login</button>
        <button class="btn btn-invitado" onclick="probarCambioPantalla()">2. Probar Invitado</button>
    </div>

    <div id="pantalla-exito" style="display: none; margin-top: 50px;">
        <h1 style="color: #4CAF50;">¡EL JAVASCRIPT FUNCIONA!</h1>
        <p style="color: #aaa;">Si estás viendo esto, el móvil permite hacer clics y cambiar de pantallas sin bloquearse.</p>
        <button class="btn" onclick="location.reload()" style="margin-top: 20px;">Volver atrás</button>
    </div>

    <script>
        // ESTO ATRAPA CUALQUIER ERROR QUE CONGELE TU MÓVIL Y LO ESCRIBE EN ROJO
        window.onerror = function(mensaje, origen, linea) {
            var consola = document.getElementById('debug-console');
            consola.style.display = 'block';
            consola.innerHTML += "❌ <b>Línea " + linea + "</b>: " + mensaje + "<br><br>";
            return false;
        };

        // Forzar un error a propósito para comprobar que la caja chivata funciona
        function probarBotonLogin() {
            var consola = document.getElementById('debug-console');
            consola.style.display = 'block';
            consola.innerHTML += "✅ El botón Login reconoce el clic.<br>";
        }

        // Probar si el móvil nos deja apagar la pantalla de inicio
        function probarCambioPantalla() {
            document.getElementById('pantalla-login').style.display = 'none';
            document.getElementById('pantalla-exito').style.display = 'block';
        }
    </script>

</body>
</html>
