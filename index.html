<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogisTank - Diagnóstico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #FFF; font-family: sans-serif; margin: 0; padding: 0; }
        .btn-purple { background-color: #673AB7; color: white; border: none; font-weight: bold; }
        .form-control { background-color: #1E1E1E; color: white; border: 1px solid #333; }
        .form-control:focus { border-color: #673AB7; box-shadow: none; background-color: #1E1E1E; color: white;}
    </style>
</head>
<body>

    <div id="consola-errores" style="display: none; background-color: #ff0000; color: white; padding: 20px; width: 100%; font-family: monospace; font-size: 16px; position: fixed; top: 0; z-index: 9999; border-bottom: 5px solid black; box-shadow: 0px 5px 15px rgba(0,0,0,0.5);">
        <strong>🚨 DETECTOR DE ERRORES:</strong><br><br>
    </div>

    <script>
        window.onerror = function(mensaje, origen, linea, columna, error) {
            var caja = document.getElementById('consola-errores');
            caja.style.display = 'block';
            caja.innerHTML += "💥 <b>LÍNEA " + linea + "</b><br>" + mensaje + "<br><br>";
            return false;
        };
        // Para pillar errores de internet o de Google
        window.addEventListener('unhandledrejection', function(event) {
            var caja = document.getElementById('consola-errores');
            caja.style.display = 'block';
            caja.innerHTML += "💥 <b>ERROR DE CONEXIÓN</b><br>" + event.reason + "<br><br>";
        });
    </script>


    <div id="pantalla-login" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="card shadow-lg p-4 w-100 mx-auto" style="max-width: 400px; border-radius: 24px; background-color: #1E1E1E; border: none;">
            <div class="text-center mb-4">
                <h1 class="fw-bold" style="color: #D1C4E9;">LogisTank</h1>
                <p style="color: #4CAF50; font-weight: bold;">Paso 1: Diagnóstico Seguro</p>
            </div>
            
            <input type="text" id="login-user" class="form-control mb-3 py-3" placeholder="Usuario">
            <input type="password" id="login-pass" class="form-control mb-4 py-3" placeholder="Contraseña">
            
            <button onclick="hacerLogin()" id="btn-login" class="btn btn-purple w-100 mb-3 py-3 fs-5">Iniciar Sesión</button>
            <div style="border-top: 1px solid #333; margin: 16px 0;"></div>
            <button onclick="entrarInvitado()" class="btn btn-outline-light w-100 py-3 fs-5">Entrar como Invitado</button>
        </div>
    </div>


    <div id="pantalla-app" style="display: none; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh;">
        <h1 style="color: #4CAF50; font-weight: 900;">¡SISTEMA OK!</h1>
        <p id="mensaje-bienvenida" style="font-size: 20px; color: #aaa; margin-top: 15px;"></p>
        <button onclick="location.reload()" class="btn btn-outline-light mt-4 px-4 py-2">Volver atrás</button>
    </div>


    <script>
        var URL_API = 'https://script.google.com/macros/s/AKfycbyIZAUVYjHnZS_BEmcsnHO-qf538S9mKul9np0cTCkm3ssw9cv-dJOfC3olhvV8Jj4d/exec';

        function entrarInvitado() {
            document.getElementById('pantalla-login').style.display = 'none';
            document.getElementById('pantalla-app').style.display = 'flex';
            document.getElementById('mensaje-bienvenida').innerText = "Has entrado como Invitado";
        }

        function hacerLogin() {
            var u = document.getElementById('login-user').value.trim();
            var p = document.getElementById('login-pass').value.trim();
            
            if (u === "" || p === "") { 
                alert("Pon usuario y contraseña"); 
                return; 
            }
            
            var btn = document.getElementById('btn-login');
            btn.innerText = "Conectando...";
            btn.disabled = true;

            fetch(URL_API, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'login', username: u, password: p })
            })
            .then(function(res) { 
                return res.json(); 
            })
            .then(function(datos) {
                if (datos.success) {
                    document.getElementById('pantalla-login').style.display = 'none';
                    document.getElementById('pantalla-app').style.display = 'flex';
                    document.getElementById('mensaje-bienvenida').innerText = "Has entrado como: " + datos.nombre;
                } else {
                    alert("Credenciales incorrectas.");
                    btn.innerText = "Iniciar Sesión";
                    btn.disabled = false;
                }
            })
            .catch(function(e) {
                alert("Fallo de conexión con Google Sheets.");
                btn.innerText = "Iniciar Sesión";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
