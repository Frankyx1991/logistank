<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogisTank - Paso 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #121212; color: #FFFFFF; margin: 0; padding: 0; }
        .bg-purple { background-color: #673AB7 !important; }
        .text-purple { color: #D1C4E9 !important; }
        .btn-purple { background-color: #673AB7; color: white; border: none; font-weight: bold; }
        
        .form-control { background-color: #1E1E1E; color: white; border: 1px solid #333; }
        .form-control:focus { background-color: #1E1E1E; color: white; border-color: #673AB7; box-shadow: none; }
        
        .nav-pills { padding: 0; gap: 8px; }
        .nav-pills .nav-link { background-color: #1E1E1E; color: #D1C4E9; font-weight: bold; border-radius: 8px; padding: 12px; }
        .nav-pills .nav-link.active { background-color: #673AB7 !important; color: white !important; }

        /* Consola de errores chivata */
        #debug-console { display: none; background-color: #8b0000; color: white; padding: 15px; width: 100%; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

    <div id="debug-console"><strong>⚠️ ERROR DETECTADO:</strong><br></div>

    <div id="pantalla-login" class="container d-flex flex-column justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4 w-100" style="max-width: 400px; border-radius: 24px; background-color: #1E1E1E; border: none;">
            <div class="text-center mb-4">
                <h1 class="fw-black text-purple" style="font-weight: 900;">LogisTank</h1>
                <p class="text-muted">Paso 2: Interfaz Estricta</p>
            </div>
            
            <div class="mb-3">
                <label class="form-label text-white fw-bold">Nº Conductor / Usuario</label>
                <input type="text" id="login-user" class="form-control py-3" placeholder="Usuario">
            </div>
            <div class="mb-4">
                <label class="form-label text-white fw-bold">Contraseña</label>
                <input type="password" id="login-pass" class="form-control py-3" placeholder="****">
            </div>
            
            <button onclick="simularLogin()" id="btn-login" class="btn btn-purple w-100 mb-3 py-3 fs-5">Iniciar Sesión</button>
            <div style="border-top: 1px solid #333; margin: 16px 0;"></div>
            <button onclick="entrarInvitado()" class="btn btn-outline-light w-100 py-3 fs-5">Entrar como Invitado</button>
        </div>
    </div>

    <div id="pantalla-app" style="display: none; flex-direction: column; min-height: 100vh;">
        <header class="bg-purple text-white p-3 shadow-sm">
            <div class="d-flex justify-content-between align-items-center mx-auto" style="max-width: 1200px;">
                <div>
                    <h3 class="m-0 fw-black" style="font-weight: 900;">LogisTank</h3>
                    <small id="nombre-usuario">Cargando...</small>
                </div>
                <button onclick="location.reload()" class="btn btn-danger btn-sm px-3 py-2 fw-bold" style="background: #DC3545; border: none; border-radius: 8px;">Salir</button>
            </div>
        </header>

        <main class="flex-grow-1 p-3 w-100 mx-auto" style="max-width: 1200px;">
            <ul class="nav nav-pills nav-fill mb-4">
                <li class="nav-item"><a class="nav-link active" href="#">Gasolineras</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Rutas</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Códigos</a></li>
            </ul>

            <div class="text-center mt-5">
                <h4 style="color: #4CAF50;">¡ÉXITO TOTAL!</h4>
                <p class="text-muted mt-3">Has pasado la barrera del login.<br>El diseño funciona perfectamente.</p>
            </div>
        </main>
    </div>

    <script>
        // Atrapa cualquier fallo silencioso
        window.onerror = function(msg, url, line) {
            document.getElementById('debug-console').style.display = 'block';
            document.getElementById('debug-console').innerHTML += "Línea " + line + ": " + msg + "<br>";
            return false;
        };

        // Función unificada para cambiar la pantalla
        function pasarALaApp(nombreTexto) {
            document.getElementById('pantalla-login').style.display = 'none';
            document.getElementById('pantalla-app').style.display = 'flex';
            document.getElementById('nombre-usuario').innerText = nombreTexto;
        }

        // Botón Invitado
        function entrarInvitado() {
            pasarALaApp("Invitado (INVITADO)");
        }

        // Botón Iniciar Sesión (Simulado)
        function simularLogin() {
            var u = document.getElementById('login-user').value.trim();
            var p = document.getElementById('login-pass').value.trim();
            
            if(u === "" || p === "") {
                alert("Por favor, escribe un usuario y contraseña falsos para probar.");
                return;
            }

            var btn = document.getElementById('btn-login');
            btn.innerText = "Conectando...";
            btn.disabled = true;

            // Simulamos que tarda 1 segundo en conectar a internet y luego te deja pasar
            setTimeout(function() {
                pasarALaApp(u + " (ADMIN)");
                btn.innerText = "Iniciar Sesión";
                btn.disabled = false;
            }, 1000);
        }
    </script>
</body>
</html>
