<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogisTank Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #121212; color: #FFFFFF; margin: 0; padding: 0; }
        .bg-purple { background-color: #673AB7 !important; }
        .text-purple { color: #D1C4E9 !important; }
        .btn-purple { background-color: #673AB7; color: white; border: none; font-weight: bold; }
        .form-control, .form-select, .input-group-text { background-color: #1E1E1E; color: white; border: 1px solid #333; }
        .card-station { border-radius: 12px; border: none; background-color: #1E1E1E; position: relative; padding-left: 20px; margin-bottom: 12px; }
        .brand-indicator { width: 8px; height: 100%; position: absolute; left: 0; top: 0; border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .nav-pills .nav-link { color: #D1C4E9; font-weight: bold; border-radius: 8px; }
        .nav-pills .nav-link.active { background-color: #673AB7 !important; color: white !important; }
        .truck-body { width: 80px; height: 310px; background-color: #333; border: 2px solid #555; border-radius: 24px; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; }
        .truck-head { width: 70px; height: 45px; background-color: #555; border-radius: 6px; }
        .truck-neck { width: 16px; height: 12px; background-color: gray; }
        .truck-hatch { width: 45px; height: 45px; border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; }
        .zone-canvas { width: 62px; height: 310px; position: relative; }
        .fuel-circle { width: 48px; height: 48px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.5); display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 12px; position: absolute; }
        #consola-errores { display: none; background-color: #ff0000; color: white; padding: 15px; width: 100%; position: absolute; top: 0; z-index: 9999; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

    <div id="consola-errores"></div>
    <script>
        window.onerror = function(msg, url, line) {
            document.getElementById('consola-errores').style.display = 'block';
            document.getElementById('consola-errores').innerHTML += "ERROR: " + msg + " (Línea " + line + ")<br>";
        };
    </script>

    <div id="screen-login" class="container d-flex flex-column justify-content-center align-items-center vh-100" style="display: flex;">
        <div class="card shadow-lg p-4 w-100" style="max-width: 400px; border-radius: 24px; background-color: #1E1E1E; border: none;">
            <div class="text-center mb-4">
                <h1 class="fw-black text-purple">LogisTank</h1>
                <p class="text-muted">Control Logístico Web</p>
                <span class="badge bg-warning text-dark px-3 py-2" style="font-size:14px;">VERSIÓN 6.0 (RESCATE)</span>
            </div>
            
            <div class="mb-3">
                <input type="text" id="inp-user" class="form-control py-3" placeholder="Usuario">
            </div>
            <div class="mb-4">
                <input type="password" id="inp-pass" class="form-control py-3" placeholder="Contraseña">
            </div>
            
            <button onclick="hacerLogin()" id="btn-login" class="btn btn-purple w-100 mb-3 py-3">Iniciar Sesión</button>
            <button onclick="entrarInvitado()" class="btn btn-outline-light w-100 py-3">Entrar como Invitado</button>
        </div>
    </div>

    <div id="screen-main" class="flex-column" style="min-height: 100vh; display: none;">
        <header class="bg-purple text-white p-3 shadow-sm">
            <div class="d-flex justify-content-between align-items-center mx-auto" style="max-width: 1200px;">
                <div>
                    <h3 class="m-0 fw-black" onclick="irPestana('GAS')">LogisTank</h3>
                    <small id="txt-user">Cargando...</small>
                </div>
                <button onclick="location.reload()" class="btn btn-danger btn-sm px-3 fw-bold">Salir</button>
            </div>
        </header>

        <main class="flex-grow-1 p-3 w-100 mx-auto" style="max-width: 1200px; position: relative;">
            <ul class="nav nav-pills nav-fill mb-4" id="menu-tabs">
                <li class="nav-item"><a class="nav-link active" id="tab-gas" href="#" onclick="irPestana('GAS')">Gasolineras</a></li>
                <li class="nav-item"><a class="nav-link" id="tab-routes" href="#" onclick="irPestana('RUTAS')">Rutas</a></li>
                <li class="nav-item"><a class="nav-link" id="tab-codes" href="#" onclick="irPestana('CODIGOS')">Códigos</a></li>
            </ul>

            <div id="zona-listas"></div>
            <div id="zona-visor" style="display: none; padding-bottom: 80px;"></div>
        </main>
    </div>

    <script>
        const URL_API = 'https://script.google.com/macros/s/AKfycbyIZAUVYjHnZS_BEmcsnHO-qf538S9mKul9np0cTCkm3ssw9cv-dJOfC3olhvV8Jj4d/exec';
        
        let bdGasolineras = [];
        let roleActual = 'INVITADO';
        let gasVista = null;

        // 1. FUNCIÓN DE INVITADO (A PRUEBA DE BALAS)
        function entrarInvitado() {
            // Cambio visual INMEDIATO sin guardar en memoria
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('screen-main').style.display = 'flex';
            document.getElementById('txt-user').innerText = "Invitado (INVITADO)";
            roleActual = 'INVITADO';
            descargarDatos();
        }

        // 2. FUNCIÓN DE LOGIN
        function hacerLogin() {
            let u = document.getElementById('inp-user').value.trim();
            let p = document.getElementById('inp-pass').value.trim();
            if(u === "" || p === "") { alert("Rellena usuario y contraseña."); return; }
            
            let btn = document.getElementById('btn-login');
            btn.innerText = "Conectando..."; btn.disabled = true;

            fetch(URL_API, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'login', username: u, password: p })
            })
            .then(res => res.json())
            .then(datos => {
                if(datos.success) {
                    // CAMBIO VISUAL INMEDIATO
                    document.getElementById('screen-login').style.display = 'none';
                    document.getElementById('screen-main').style.display = 'flex';
                    document.getElementById('txt-user').innerText = datos.nombre + " (" + datos.role + ")";
                    roleActual = datos.role;
                    descargarDatos();
                } else {
                    alert("Usuario o contraseña incorrectos");
                    btn.innerText = "Iniciar Sesión"; btn.disabled = false;
                }
            })
            .catch(error => {
                alert("Error de conexión. Fallo de red.");
                btn.innerText = "Iniciar Sesión"; btn.disabled = false;
            });
        }

        // 3. DESCARGAR GASOLINERAS
        function descargarDatos() {
            let zona = document.getElementById('zona-listas');
            zona.innerHTML = '<div class="text-center mt-5"><h5 class="text-purple">Descargando base de datos...</h5></div>';
            
            fetch(URL_API + '?action=getGasStations')
            .then(res => res.json())
            .then(datos => {
                bdGasolineras = datos;
                irPestana('GAS');
            })
            .catch(err => {
                zona.innerHTML = '<div class="alert alert-danger mt-5 text-center">No se pudo conectar a Google Sheets.</div>';
            });
        }

        // 4. CONTROL DE PESTAÑAS
        function irPestana(p) {
            document.getElementById('tab-gas').className = 'nav-link';
            document.getElementById('tab-routes').className = 'nav-link';
            document.getElementById('tab-codes').className = 'nav-link';
            
            if(p === 'GAS') document.getElementById('tab-gas').className = 'nav-link active';
            if(p === 'RUTAS') document.getElementById('tab-routes').className = 'nav-link active';
            if(p === 'CODIGOS') document.getElementById('tab-codes').className = 'nav-link active';

            document.getElementById('zona-listas').style.display = 'block';
            document.getElementById('zona-visor').style.display = 'none';
            document.getElementById('menu-tabs').style.display = 'flex';

            if(p === 'GAS') pintarLista();
            else document.getElementById('zona-listas').innerHTML = '<h5 class="text-center mt-5 text-muted">Aún no disponible en esta versión</h5>';
        }

        function pintarLista() {
            let html = '';
            let lista = [...bdGasolineras].sort((a,b) => (a.nombre||'').localeCompare(b.nombre||''));
            for(let i=0; i<lista.length; i++) {
                let s = lista[i];
                let colorHex = obtenerColorHex(s.marca);
                html += `
                <div class="card card-station p-3 shadow-sm" onclick="verGasolinera('${s.id}')" style="border-left: 8px solid ${colorHex};">
                    <h5 class="fw-bold mb-0 text-white">${s.nombre}</h5>
                    <small style="color:#aaa;">${s.marca} • ${s.direccion}</small>
                </div>`;
            }
            document.getElementById('zona-listas').innerHTML = html;
        }

        // 5. VISOR DEL CAMIÓN
        function verGasolinera(id) {
            gasVista = bdGasolineras.find(x => x.id === id);
            if(!gasVista) return;
            
            document.getElementById('zona-listas').style.display = 'none';
            document.getElementById('menu-tabs').style.display = 'none';
            document.getElementById('zona-visor').style.display = 'block';
            
            dibujarCamion(gasVista.ladoDescarga === 'BOTH' ? 'LEFT' : gasVista.ladoDescarga, 1);
        }

        function dibujarCamion(lado, zonaActiva) {
            let s = gasVista;
            let hex = obtenerColorHex(s.marca);
            let zonaHTML = document.getElementById('zona-visor');

            let html = `
                <button class="btn btn-outline-light mb-3" onclick="irPestana('GAS')">← Volver</button>
                <div class="card card-station p-3" style="border-top: 6px solid ${hex};">
                    <h4 class="text-white fw-bold m-0">${s.nombre}</h4>
                    <small style="color:#aaa;">${s.direccion}</small>
                </div>
                <h5 class="text-center text-white mt-4 fw-bold">Esquema de Descarga</h5>`;

            if(s.ladoDescarga === 'BOTH') {
                html += `<div class="d-flex justify-content-center gap-2 mb-3">
                    <button class="btn btn-sm ${lado==='LEFT'?'btn-purple':'btn-outline-light'}" onclick="dibujarCamion('LEFT', ${zonaActiva})">IZQ</button>
                    <button class="btn btn-sm ${lado==='RIGHT'?'btn-purple':'btn-outline-light'}" onclick="dibujarCamion('RIGHT', ${zonaActiva})">DER</button>
                </div>`;
            }
            
            if(s.zonasDescarga > 1) {
                html += `<div class="d-flex justify-content-center gap-2 mb-4">`;
                for(let i=1; i<=s.zonasDescarga; i++) {
                    html += `<button class="btn btn-sm ${i===zonaActiva?'btn-purple':'btn-outline-light'}" onclick="dibujarCamion('${lado}', ${i})">ZONA ${i}</button>`;
                }
                html += `</div>`;
            }

            let isM = lado === 'LEFT';
            let lienzoHtml = `<div class="zone-canvas">`;
            let productosZona = (s.productos || []).filter(x => x.zonaIndex === zonaActiva);
            if(isM) productosZona.reverse();
            
            for(let i=0; i<productosZona.length; i++) {
                let p = productosZona[i];
                let color = infoColor(p.codigoProducto);
                let cx = isM ? -p.nx : p.nx; let cy = isM ? -p.ny : p.ny;
                lienzoHtml += `<div class="fuel-circle" style="left:${7+cx}px; top:${131+cy}px; background:${color.bg}; color:${color.txt};">${color.short}</div>`;
            }
            lienzoHtml += `</div>`;

            let camionHtml = `<div class="d-flex flex-column align-items-center"><div class="truck-head"></div><div class="truck-neck"></div><div class="truck-body"><div class="truck-hatch"></div><div class="truck-hatch"></div><div class="truck-hatch"></div><div class="truck-hatch"></div><div class="truck-hatch"></div></div></div>`;

            html += `<div class="d-flex justify-content-center align-items-center my-4">${isM ? (lienzoHtml + '<div style="width:16px;"></div>' + camionHtml) : (camionHtml + '<div style="width:16px;"></div>' + lienzoHtml)}</div>`;
            
            zonaHTML.innerHTML = html;
        }

        // 6. UTILIDADES DE COLOR
        function obtenerColorHex(m) { let c=(m||'').toUpperCase(); if(c.includes('REPSOL'))return'#FF9800'; if(c.includes('BP'))return'#4CAF50'; if(c.includes('MOEVE'))return'#005CE6'; if(c.includes('SHELL'))return'#FFC107'; if(c.includes('GALP'))return'#FF5000'; return'#673AB7'; }
        function infoColor(c) { let n=(c||'').toUpperCase().trim(); let bg='#424242'; let txt='#FFF'; let s=n; switch(n){ case 'A':bg='#FFB300';break; case 'A+5':bg='#F57C00';break; case 'A+':bg='#FF8F00';break; case 'NEXA':bg='#00838F';s='NEX';break; case 'B':bg='#D32F2F';break; case 'B MAR PRO':bg='#880E4F';s='BPR';break; case 'C':bg='#0288D1';break; case 'BIENERGI 10':bg='#6A1B9A';s='B10';break; case '95':bg='#388E3C';break; case '95+':bg='#1B5E20';break; case '95 MAR SPORT':bg='#00E676';txt='#000';s='95S';break; case '98':bg='#1565C0';break; case 'MARBIDIESEL':bg='#5D4037';s='MBD';break; } return {bg,txt,short:s}; }
    </script>
</body>
</html>
